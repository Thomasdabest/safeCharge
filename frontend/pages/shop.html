<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mako Energy | Shop</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="../index.html" aria-label="Mako Energy Home">Mako Energy</a>

            <nav class="main-nav" aria-label="Main navigation">
                <a href="shop.html">Products</a>
                <a href="cart.html">Cart (<span data-cart-count>0</span>)</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <p class="kicker">ONLINE STORE</p>
        <h1>Build Your Pack</h1>
        <p>Choose flavors and add them to your cart.</p>

        <div class="shop-actions">
            <a class="cart-link" href="cart.html">Go to Cart (<span data-cart-count>0</span>)</a>
            <p id="shop-status" class="checkout-status" aria-live="polite"></p>
        </div>

        <section aria-label="Products">
            <div id="product-grid" class="product-grid"></div>
        </section>
    </main>
     <footer class="site-footer" aria-label="Footer">
        <div class="footer-inner">
            <div>
                <h5>Contact Us</h5>
                <p>Email: info@drinkmako.energy</p>
                <p>Phone: (123) 456-7890</p>
            </div>
            <div>
                <h5>Follow Us</h5>
                <a href="https://www.instagram.com/drinkmako.energy/" target="_blank" rel="noopener noreferrer">
                    <button type="button" class="logo-btn">
                    <img src="/frontend/symbols/Instagram-icon-isolated-on-transparent-background-PNG.png" alt="Instagram" style="width:20px; vertical-align:middle;">
                    </button>
                </a>
                <a href="https://www.tiktok.com/@makoenergy1" target="_blank" rel="noopener noreferrer">
                    <button type="button" class="logo-btn">
                        <img src="/frontend/symbols/tik-tok-icon-social-media-logo-design-vector-illustration-isolated-transparent-background-215343938.jpg" alt="Twitter" style="width:20px; vertical-align:middle;">
                    </button>
                </a>
            </div>
            <p class="footer-copy">&copy; 2026 Mako Energy</p>
        </div>
    </footer>
    <script src="../js/script.js" defer></script>
</body>
</html>
