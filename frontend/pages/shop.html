<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mako Energy | Shop</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="../index.html" aria-label="Mako Energy Home">Mako Energy</a>

            <nav class="main-nav" aria-label="Main navigation">
                <a href="shop.html">Products</a>
                <a href="cart.html">Cart (<span data-cart-count>0</span>)</a>
            </nav>
        </div>
    </header>

    <main class="hero">
        <p class="kicker">ONLINE STORE</p>
        <h1>Build Your Pack</h1>
        <p>Choose flavors and add them to your cart.</p>

        <div class="shop-actions">
            <a class="cart-link" href="cart.html">Go to Cart (<span data-cart-count>0</span>)</a>
            <p id="shop-status" class="checkout-status" aria-live="polite"></p>
        </div>

        <section aria-label="Products">
            <div id="product-grid" class="product-grid"></div>
        </section>
    </main>

    <script src="../js/script.js" defer></script>
</body>
</html>
